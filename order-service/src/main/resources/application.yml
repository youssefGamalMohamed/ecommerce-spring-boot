server:
  servlet:
    context-path: /ecommerce/api/v1/orders
  port: 9094
spring:
  application.name: order-service
  datasource:
    url: jdbc:mysql://localhost:3306/order-service-db
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    database-platform: org.hibernate.dialect.MySQL8Dialect
    generate-ddl: true
    hibernate:
      ddl-auto: update
  sql:
    init:
      mode: always
  graphql:
    graphiql:
      enabled: true
logging:
  level:
    org:
      zalando:
        logbook: trace