server:
  servlet:
    context-path: /ecommerce/api/v1/categories # when you want to get the graphql type the baseUrl/graphql
  port: 9091

spring:
  application.name: category-service
  datasource:
    url: jdbc:mysql://localhost:3306/category-service-db
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    database-platform: org.hibernate.dialect.MySQL8Dialect
    generate-ddl: true
    hibernate:
      ddl-auto: update
  sql:
    init:
      mode: always
  graphql:
    graphiql:
      enabled: true # this to display to u dashboard to test graphql without needing postman => baseUrl/graphql
logging:
  level:
    org:
      zalando:
        logbook: trace