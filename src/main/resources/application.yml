server:
  servlet:
    context-path: /ecommerce/api/v1
  port: 8081

application:
  security:
    jwt:
      secret-key: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
      expiration: 60000
      refresh-token:
        expiration: 604800000
      verification-token:
        expiration: 86400000
      reset-password-token:
        expiration: 86400000

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/ecommerce
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    database-platform: org.hibernate.dialect.MySQL8Dialect
    generate-ddl: true
    hibernate:
      ddl-auto: update
    show-sql: true
  mail:
    host: localhost
    port: 1025
    username: ''
    password: ''

activemq:
  broker-url: tcp://localhost:61616
  username: admin
  password: admin
  EmailQueue: EmailQueue
  InventoryQueue: InventoryQueue
  ForgetPasswordQueue: ForgetPasswordQueue

ecommerce:
  email: EcommerceApplication@gmail.com

springdoc:
  swagger-ui:
    path: /swagger-ui
  api-docs:
    path: /api-docs/swagger.json

logging:
  level:
    org:
      hibernate:
        SQL: debug
        orm:
          jdbc:
            bind: trace
        type:
          descriptor:
            sql: trace
      springframework:
        web:
          filter:
            CommonsRequestLoggingFilter: DEBUG
    net:
      ttddyy:
        dsproxy:
          listener: debug
