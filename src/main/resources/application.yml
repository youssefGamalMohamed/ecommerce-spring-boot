server:
  servlet:
    context-path: /ecommerce/api/v1
  port: 8081



spring:
  datasource:
    url: jdbc:mysql://localhost:3306/ecommerce
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    database-platform: org.hibernate.dialect.MySQL8Dialect
    generate-ddl: true
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        jdbc:
          time_zone: UTC






springdoc:
  swagger-ui:
    path: /swagger-ui
  api-docs:
    path: /api-docs/swagger.json

logging:
  level:
    org:
      hibernate:
        SQL: debug
        orm:
          jdbc:
            bind: trace
        type:
          descriptor:
            sql: trace
      springframework:
        web:
          filter:
            CommonsRequestLoggingFilter: DEBUG
    net:
      ttddyy:
        dsproxy:
          listener: debug
