server:
  servlet:
    context-path: /ecommerce/api/v1
  port: 8081

spring:
  output:
    ansi:
      enabled: ALWAYS
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/ecommerce}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:1234}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    generate-ddl: false
    hibernate:
      ddl-auto: ${DDL_AUTO:validate}
    show-sql: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000
    web:
      pageable:
        default-page-size: 20
        max-page-size: 100
  cache:
    type: redis

cache:
  ttl:
    products: 600000

    categories: 1800000
    carts: 300000
    orders: 900000

jwt:
  secret-key: ${JWT_SECRET:T3Bwb3J0aW5lVGhpcyBCYXNlNjQgU2VjcmV0IEtleSBGb3IgS0VUMjU2IGtleQ==}
  access-token-expiration: 900000
  refresh-token-expiration: 604800000

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
  health:
    redis:
      enabled: true
    db:
      enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui
  api-docs:
    path: /api-docs/swagger.json

logging:
  pattern:
    console: "%d{HH:mm:ss.SSS} [%X{traceId:-no-trace}] %-5level %logger{36} - %msg%n"
  level:
    org:
      hibernate:
        SQL: ${LOG_SQL:warn}
        orm:
          jdbc:
            bind: ${LOG_JDBC_BIND:warn}
        type:
          descriptor:
            sql: ${LOG_SQL_TRACE:warn}
      springframework:
        web:
          filter:
            CommonsRequestLoggingFilter: ${LOG_REQUEST:info}
        cache: ${LOG_CACHE:info}
    net:
      ttddyy:
        dsproxy:
          listener: ${LOG_PROXY:warn}
